<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<title>Contact Syphir</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg:#0d1117;--bg2:#161b25;--bg3:#1c2333;
  --border:#242d3e;--blue:#2196d3;--blue-l:#4db8f0;--blue-d:#1565a8;
  --green:#00e676;--red:#f44336;
  --text:#e6edf3;--text2:#8b949e;--text3:#4a5568;
}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:48px 20px;}
.logo{display:flex;align-items:center;gap:9px;margin-bottom:36px;text-decoration:none;}
.logo-icon{width:34px;height:34px;background:linear-gradient(135deg,var(--blue),var(--blue-d));border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:16px;box-shadow:0 0 16px rgba(33,150,211,0.35);}
.logo-text{font-size:18px;font-weight:800;color:var(--text);letter-spacing:-0.4px;}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:40px;width:100%;max-width:520px;}
h1{font-size:21px;font-weight:800;margin-bottom:6px;letter-spacing:-0.3px;}
.sub{font-size:13.5px;color:var(--text2);margin-bottom:28px;line-height:1.55;}
.field{margin-bottom:15px;}
label{display:block;font-size:10.5px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:0.8px;margin-bottom:6px;}
input,textarea{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:7px;padding:10px 13px;font-size:13px;color:var(--text);font-family:'Inter',sans-serif;outline:none;transition:border-color 0.15s;resize:vertical;}
input:focus,textarea:focus{border-color:var(--blue);}
textarea{min-height:112px;}
.row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.btn{width:100%;background:var(--blue);color:#fff;border:none;padding:13px;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer;font-family:'Inter',sans-serif;margin-top:8px;transition:background 0.15s;letter-spacing:-0.1px;}
.btn:hover{background:var(--blue-d);}
.btn:disabled{opacity:0.55;cursor:not-allowed;}
.err-msg{font-size:12.5px;color:var(--red);margin-top:10px;min-height:18px;}
.success{text-align:center;padding:16px 0;}
.s-icon{font-size:46px;margin-bottom:14px;}
.s-title{font-size:19px;font-weight:800;margin-bottom:8px;}
.s-sub{font-size:13px;color:var(--text2);line-height:1.55;margin-bottom:24px;}
.back{color:var(--blue-l);font-size:13px;text-decoration:none;}
.back:hover{text-decoration:underline;}
@media(max-width:480px){.row{grid-template-columns:1fr;}}
</style>
</head>
<body>

<a href="index.html" class="logo">
  <div class="logo-icon">🛡️</div>
  <div class="logo-text">Syphir</div>
</a>

<div class="card">

  <div id="form-view">
    <h1>Get in Touch</h1>
    <p class="sub">Interested in Syphir for your team? We'll get back to you within 24 hours.</p>

    <div class="row">
      <div class="field">
        <label>Name *</label>
        <input type="text" id="c-name" placeholder="Jane Smith" autocomplete="name">
      </div>
      <div class="field">
        <label>Work Email *</label>
        <input type="email" id="c-email" placeholder="jane@company.com" autocomplete="email">
      </div>
    </div>
    <div class="field">
      <label>Company</label>
      <input type="text" id="c-company" placeholder="Acme Medical Group" autocomplete="organization">
    </div>
    <div class="field">
      <label>Message *</label>
      <textarea id="c-message" placeholder="Tell us about your team size, use case, or questions…"></textarea>
    </div>

    <button class="btn" id="submit-btn" onclick="submitContact()">Send Message →</button>
    <div class="err-msg" id="form-err"></div>
  </div>

  <div id="success-view" class="success" style="display:none;">
    <div class="s-icon">✅</div>
    <div class="s-title">Message Sent!</div>
    <p class="s-sub">Thanks for reaching out. We'll reply to <strong id="success-email"></strong> within 24 hours.</p>
    <a href="index.html" class="back">← Back to Syphir</a>
  </div>

</div>

<script>
const API = 'https://syphir-api.onrender.com';

(function() {
  const plan = new URLSearchParams(window.location.search).get('plan');
  if (plan) {
    document.addEventListener('DOMContentLoaded', function() {
      const prices = { Starter: 99, Professional: 249, Institution: 599 };
      const price = prices[plan];
      const msgEl = document.getElementById('c-message');
      if (msgEl) msgEl.value = `I'm interested in the ${plan} plan${price ? ' ($' + price + '/mo)' : ''}. Please set up my account.`;
    });
  }
})();

async function submitContact() {
  const name    = document.getElementById('c-name').value.trim();
  const email   = document.getElementById('c-email').value.trim();
  const company = document.getElementById('c-company').value.trim();
  const message = document.getElementById('c-message').value.trim();
  const errEl   = document.getElementById('form-err');
  const btn     = document.getElementById('submit-btn');

  errEl.textContent = '';
  if (!name || !email || !message) {
    errEl.textContent = 'Name, email, and message are required.'; return;
  }
  if (!email.includes('@')) {
    errEl.textContent = 'Enter a valid email address.'; return;
  }

  btn.textContent = 'Sending…';
  btn.disabled = true;

  try {
    const res = await fetch(`${API}/contact`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name, email, company, message })
    });
    const data = await res.json();
    if (!res.ok || !data.success) throw new Error(data.error || 'Failed to send');
    document.getElementById('success-email').textContent = email;
    document.getElementById('form-view').style.display = 'none';
    document.getElementById('success-view').style.display = 'block';
  } catch(e) {
    errEl.textContent = 'Could not send: ' + e.message;
    btn.textContent = 'Send Message →';
    btn.disabled = false;
  }
}

// Ctrl+Enter submits
document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) submitContact();
});
</script>
</body>
</html>
