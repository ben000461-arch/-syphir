<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Syphir Admin — Business Management</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared.css">
</head>
<body>

<div id="adminGate" style="display:flex; min-height:100vh; align-items:center; justify-content:center; padding:1rem;">
  <div style="background:var(--surface); border:1px solid rgba(91,79,232,0.3); border-radius:18px; padding:2.5rem; width:100%; max-width:380px;">
    <div style="display:flex; align-items:center; gap:8px; margin-bottom:2rem; font-weight:700; font-size:1.1rem;">
      <div class="logo-icon"><svg viewBox="0 0 16 16"><path d="M8 1L2 4v5c0 3.5 2.5 6 6 7 3.5-1 6-3.5 6-7V4L8 1z"/></svg></div>
      Syphir Admin
    </div>
    <h2 style="font-size:1.3rem; font-weight:700; margin-bottom:0.4rem; letter-spacing:-0.01em;">Admin Access</h2>
    <p style="color:var(--muted); font-size:0.88rem; margin-bottom:1.5rem;">Enter your admin key to manage businesses.</p>
    <div class="field">
      <label>Admin Key</label>
      <input class="mono" id="adminKeyIn" placeholder="SYP-ADMIN-XXXX-XXXX" oninput="this.value=this.value.toUpperCase()" style="width:100%; background:var(--black); border:1px solid var(--border); border-radius:8px; padding:0.75rem 1rem; color:var(--text); font-size:0.9rem; font-family:'JetBrains Mono',monospace; outline:none; transition:border-color 0.15s; letter-spacing:0.04em;">
      <div id="adminGateErr" style="color:var(--danger); font-size:0.8rem; margin-top:0.4rem; display:none;"></div>
    </div>
    <button onclick="checkAdminKey()" style="width:100%; background:var(--accent); color:white; border:none; padding:0.85rem; border-radius:8px; font-weight:600; font-size:0.95rem; cursor:pointer; font-family:inherit; margin-top:0.25rem; transition:background 0.15s;" onmouseover="this.style.background='#7b6df7'" onmouseout="this.style.background='var(--accent)'">
      Enter Admin Panel →
    </button>
    <div style="text-align:center; margin-top:1rem;">
      <a href="index.html" style="color:var(--muted); font-size:0.82rem; text-decoration:none;">← Back to site</a>
    </div>
  </div>
</div>

<div id="adminPanel" style="display:none;">
<nav>
  <a href="index.html" class="nav-logo">
    <div class="logo-icon"><svg viewBox="0 0 16 16"><path d="M8 1L2 4v5c0 3.5 2.5 6 6 7 3.5-1 6-3.5 6-7V4L8 1z"/></svg></div>
    Syphir
  </a>
  <div class="nav-links">
    <a href="index.html">Site</a>
    <a href="admin.html" class="active">Admin Panel</a>
  </div>
  <button class="nav-btn" onclick="window.location.href='index.html'" style="background:var(--surface2); color:var(--muted); border:1px solid var(--border);">Sign Out</button>
</nav>

<div class="admin-wrap">
  <div class="admin-header">
    <div>
      <h1>Business Management</h1>
      <p style="color:var(--muted); font-size:0.88rem; margin-top:0.25rem;">Add, manage, and provision license keys for all organizations.</p>
    </div>
    <span class="admin-badge">🔐 Admin · Benny Gomez</span>
  </div>

  <!-- Stats -->
  <div class="admin-stats" id="adminStats"></div>

  <!-- Add Business Form -->
  <div class="add-biz-form">
    <h3>Add New Business</h3>
    <div class="form-row">
      <div>
        <label style="display:block; font-size:0.75rem; font-weight:600; color:var(--muted); text-transform:uppercase; letter-spacing:0.08em; margin-bottom:0.35rem;">Business Name</label>
        <input class="form-input" id="newBizName" placeholder="e.g. Smile Dental Group">
      </div>
      <div>
        <label style="display:block; font-size:0.75rem; font-weight:600; color:var(--muted); text-transform:uppercase; letter-spacing:0.08em; margin-bottom:0.35rem;">Admin Email</label>
        <input class="form-input" id="newBizEmail" type="email" placeholder="admin@theirdomain.com">
      </div>
      <div>
        <label style="display:block; font-size:0.75rem; font-weight:600; color:var(--muted); text-transform:uppercase; letter-spacing:0.08em; margin-bottom:0.35rem;">Plan</label>
        <select class="form-select" id="newBizPlan">
          <option value="Starter">Starter — $99/mo</option>
          <option value="Professional" selected>Professional — $249/mo</option>
          <option value="Institution">Institution — $599/mo</option>
          <option value="Demo">Free Demo / Pilot</option>
        </select>
      </div>
    </div>
    <div class="form-row">
      <div>
        <label style="display:block; font-size:0.75rem; font-weight:600; color:var(--muted); text-transform:uppercase; letter-spacing:0.08em; margin-bottom:0.35rem;">Status</label>
        <select class="form-select" id="newBizStatus">
          <option value="demo">Demo / Pilot</option>
          <option value="active">Active (Paying)</option>
          <option value="inactive">Inactive</option>
        </select>
      </div>
      <div>
        <label style="display:block; font-size:0.75rem; font-weight:600; color:var(--muted); text-transform:uppercase; letter-spacing:0.08em; margin-bottom:0.35rem;">Custom Key (optional)</label>
        <input class="form-input" id="newBizKey" placeholder="Leave blank to auto-generate" style="font-family:'JetBrains Mono',monospace; font-size:0.82rem;">
      </div>
      <div style="display:flex; align-items:flex-end;">
        <button class="add-btn" onclick="addBusiness()" style="width:100%;">+ Add Business</button>
      </div>
    </div>
    <div id="addErr" style="color:var(--danger); font-size:0.82rem; margin-top:0.5rem; display:none;"></div>
  </div>

  <!-- Business Table -->
  <div class="biz-table" id="bizTable">
    <div class="biz-table-head">
      <div>Business</div>
      <div>Admin Email</div>
      <div>License Key</div>
      <div>Status</div>
      <div>Actions</div>
    </div>
    <div id="bizRows"></div>
  </div>

</div>
</div>

<div class="toast" id="toast"></div>

<script src="auth.js"></script>
<script>
const ADMIN_SECRET  = 'bridgeline2025';
const ADMIN_SECRET = 'bridgeline2025'; // auth
const ADMIN_KEY_VAL = 'SYP-ADMIN-BENNY-2026';

function checkAdminKey() {
  const val = document.getElementById('adminKeyIn').value.trim().toUpperCase();
  const err = document.getElementById('adminGateErr');
  if (val === ADMIN_KEY_VAL) {
    document.getElementById('adminGate').style.display = 'none';
    document.getElementById('adminPanel').style.display = 'block';
    renderAdmin();
  } else {
    err.textContent = 'Invalid admin key.';
    err.style.display = 'block';
  }
}
document.addEventListener('DOMContentLoaded', () => {
  const inp = document.getElementById('adminKeyIn');
  if (inp) inp.addEventListener('keydown', e => { if (e.key==='Enter') checkAdminKey(); });
});

function renderAdmin() {
  const bizList = getBusinesses();
  // Stats
  const active = bizList.filter(b=>b.status==='active').length;
  const demos  = bizList.filter(b=>b.status==='demo').length;
  document.getElementById('adminStats').innerHTML = `
    <div class="stat-card"><div class="stat-label">Total Businesses</div><div class="stat-value">${bizList.length}</div></div>
    <div class="stat-card"><div class="stat-label">Active (Paying)</div><div class="stat-value" style="color:var(--accent2)">${active}</div></div>
    <div class="stat-card"><div class="stat-label">Demo / Pilot</div><div class="stat-value" style="color:var(--warning)">${demos}</div></div>
    <div class="stat-card"><div class="stat-label">MRR Estimate</div><div class="stat-value">$${mrr(bizList)}</div></div>
  `;
  // Rows
  const container = document.getElementById('bizRows');
  if (bizList.length === 0) {
    container.innerHTML = '<div class="empty-state">No businesses yet. Add one above.</div>';
    return;
  }
  container.innerHTML = bizList.map(b => `
    <div class="biz-row">
      <div>
        <div class="biz-name">${b.name}</div>
        <div style="font-size:0.75rem; color:var(--muted2); margin-top:2px;">${b.plan} · Added ${b.created}</div>
      </div>
      <div class="biz-email">${b.email}</div>
      <div>
        <span class="biz-key" onclick="copyKey('${b.key}')" title="Click to copy">${b.key}</span>
        <div style="margin-top:4px;">
          <a href="install.html?key=${b.key}" target="_blank" style="font-size:0.72rem; color:var(--muted); text-decoration:none;">📎 Install link</a>
        </div>
      </div>
      <div><span class="status-pill ${b.status}">${b.status}</span></div>
      <div style="display:flex; gap:4px; flex-wrap:wrap;">
        <button class="remove-btn" onclick="removeBiz('${b.id}')" title="Remove">🗑</button>
        <button class="remove-btn" onclick="toggleStatus('${b.id}')" title="Toggle status" style="color:var(--muted);">↔</button>
      </div>
    </div>
  `).join('');
}

function mrr(list) {
  const prices = { Starter:99, Professional:249, Institution:599, Demo:0 };
  return list.filter(b=>b.status==='active').reduce((s,b) => s+(prices[b.plan]||0), 0).toLocaleString();
}

function addBusiness() {
  const name   = document.getElementById('newBizName').value.trim();
  const email  = document.getElementById('newBizEmail').value.trim();
  const plan   = document.getElementById('newBizPlan').value;
  const status = document.getElementById('newBizStatus').value;
  const customKey = document.getElementById('newBizKey').value.trim().toUpperCase();
  const err = document.getElementById('addErr');

  if (!name || !email) { err.textContent='Business name and email are required.'; err.style.display='block'; return; }
  if (!email.includes('@')) { err.textContent='Enter a valid email address.'; err.style.display='block'; return; }

  const key = customKey || generateKey(name);
  const existing = findBusinessByKey(key);
  if (existing) { err.textContent='That key already exists. Choose a different one.'; err.style.display='block'; return; }

  err.style.display = 'none';
  const bizList = getBusinesses();
  const newBiz = {
    id: 'biz_' + Date.now(),
    name, email, key, plan, status,
    created: new Date().toISOString().split('T')[0]
  };
  bizList.push(newBiz);
  saveBusinesses(bizList);

  // Clear form
  document.getElementById('newBizName').value = '';
  document.getElementById('newBizEmail').value = '';
  document.getElementById('newBizKey').value = '';

  renderAdmin();
  showToast('✓ ' + name + ' added · Key: ' + key);
}

function removeBiz(id) {
  if (!confirm('Remove this business? Their license key will stop working.')) return;
  const updated = getBusinesses().filter(b => b.id !== id);
  saveBusinesses(updated);
  renderAdmin();
  showToast('Business removed.');
}

function toggleStatus(id) {
  const list = getBusinesses();
  const biz = list.find(b=>b.id===id);
  if (!biz) return;
  const cycle = { demo:'active', active:'inactive', inactive:'demo' };
  biz.status = cycle[biz.status] || 'demo';
  saveBusinesses(list);
  renderAdmin();
  showToast(biz.name + ' → ' + biz.status);
}

function copyKey(key) {
  navigator.clipboard.writeText(key).then(() => showToast('Copied: ' + key));
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show', 'success');
  setTimeout(() => t.classList.remove('show'), 3000);
}
</script>
</body>
</html>
